name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ubuntu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Packet Probe
        uses: actions/checkout@v4

      - name: Checkout wirestead
        uses: actions/checkout@v4
        with:
          repository: wirestead/wirestead
          path: wirestead

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libboost-all-dev

      - name: Configure
        run: cmake -S . -B build -DPACKET_PROBE_BUILD_TESTS=ON -DPACKET_PROBE_WIRESTEAD_SOURCE_DIR="$GITHUB_WORKSPACE/wirestead"

      - name: Build
        run: cmake --build build -j2

      - name: Test
        run: ctest --test-dir build --output-on-failure
